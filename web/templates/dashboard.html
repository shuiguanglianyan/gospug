<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">GOSPUG</div>
      <nav>
        <a class="{{if eq .Active "dashboard"}}active{{end}}" href="/">总览</a>
        <a class="{{if eq .Active "hosts"}}active{{end}}" href="/hosts">主机管理</a>
        <a class="{{if eq .Active "tasks"}}active{{end}}" href="/tasks">任务中心</a>
        <a class="{{if eq .Active "settings"}}active{{end}}" href="/settings">系统设置</a>
      </nav>
      <a class="logout" href="/logout">退出登录</a>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>{{.Title}}</h1>
          <p>{{.PageDesc}}</p>
        </div>
        <div class="userbox">
          <strong>{{.User.Username}}</strong>
          <span>{{.User.Role}}</span>
          <small>{{.Now}}</small>
        </div>
      </header>

      <section class="stats">
        {{range $k, $v := .Stats}}
        <article class="card">
          <h3>{{$k}}</h3>
          <p>{{$v}}</p>
        </article>
        {{end}}
      </section>

      <section class="grid">
        <article class="panel">
          <h2>任务执行</h2>
          <table>
            <thead><tr><th>任务</th><th>状态</th><th>时间</th></tr></thead>
            <tbody>
            {{range .Tasks}}
              <tr><td>{{.Name}}</td><td>{{.Status}}</td><td>{{.Time}}</td></tr>
            {{end}}
            </tbody>
          </table>
        </article>

        <article class="panel">
          <h2>主机列表</h2>
          <table>
            <thead><tr><th>名称</th><th>IP</th><th>系统</th></tr></thead>
            <tbody>
            {{range .Servers}}
              <tr><td>{{.Name}}</td><td>{{.IP}}</td><td>{{.OS}}</td></tr>
            {{end}}
            </tbody>
          </table>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
